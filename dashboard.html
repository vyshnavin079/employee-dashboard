<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo">PulseBoard</div>
        <nav class="nav-links">
          <a class="active" href="dashboard.html">📊 Dashboard</a>
          <a href="employees.html">👤 Employees</a>
          <a href="attendance.html">🗓 Attendance</a>
          <a href="performance.html">🚀 Performance</a>
          <a href="rewards.html">🎖 Rewards</a>
          <a href="settings.html">⚙ Settings</a>
        </nav>
      </aside>
      <main class="content">
        <header class="topbar">
          <div class="title-group">
            <h1>Dashboard Overview</h1>
            <p>Track workforce health, engagement, and outcomes.</p>
          </div>
          <div class="avatar">AD</div>
        </header>

        <section id="dashboard-cards" class="card-grid"></section>

        <section class="section split-grid">
          <article class="card">
            <h2 class="section-title">Attendance Distribution</h2>
            <canvas id="attendanceChart" height="170"></canvas>
          </article>
          <article class="card">
            <h2 class="section-title">Performance Snapshot</h2>
            <canvas id="performanceChart" height="170"></canvas>
          </article>
        </section>
      </main>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
