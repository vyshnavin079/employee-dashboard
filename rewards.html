<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rewards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo">PulseBoard</div>
        <nav class="nav-links">
          <a href="dashboard.html">📊 Dashboard</a>
          <a href="employees.html">👤 Employees</a>
          <a href="attendance.html">🗓 Attendance</a>
          <a href="performance.html">🚀 Performance</a>
          <a class="active" href="rewards.html">🎖 Rewards</a>
          <a href="settings.html">⚙ Settings</a>
        </nav>
      </aside>
      <main class="content">
        <header class="topbar">
          <div class="title-group">
            <h1>Rewards System</h1>
            <p>Track points, achievements, and reward history.</p>
          </div>
          <div class="avatar">RW</div>
        </header>

        <section class="split-grid">
          <article id="employee-of-month" class="card"></article>
          <article class="card">
            <h2 class="section-title">Employee Achievements</h2>
            <div id="achievements"></div>
          </article>
        </section>

        <section class="section table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Employee</th>
                <th>Reason</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="reward-history-body"></tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
