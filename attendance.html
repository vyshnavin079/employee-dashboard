<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo">PulseBoard</div>
        <nav class="nav-links">
          <a href="dashboard.html">📊 Dashboard</a>
          <a href="employees.html">👤 Employees</a>
          <a class="active" href="attendance.html">🗓 Attendance</a>
          <a href="performance.html">🚀 Performance</a>
          <a href="rewards.html">🎖 Rewards</a>
          <a href="settings.html">⚙ Settings</a>
        </nav>
      </aside>
      <main class="content">
        <header class="topbar">
          <div class="title-group">
            <h1>Attendance Tracker</h1>
            <p>Monitor present/absent/late statuses and monthly trends.</p>
          </div>
          <div class="avatar">AT</div>
        </header>

        <section class="card">
          <h2 class="section-title">Attendance Percentage</h2>
          <p id="attendance-percent-text" class="muted">0% Overall Attendance</p>
          <div class="progress"><span id="attendance-percent-bar" style="width: 0%"></span></div>
        </section>

        <section class="section split-grid">
          <article class="card">
            <h2 class="section-title">Daily Attendance List</h2>
            <div id="daily-attendance"></div>
          </article>
          <article class="card">
            <h2 class="section-title">Monthly Attendance Progress</h2>
            <canvas id="monthlyAttendanceChart" height="220"></canvas>
          </article>
        </section>
      </main>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
