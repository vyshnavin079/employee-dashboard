<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo">PulseBoard</div>
        <nav class="nav-links">
          <a href="dashboard.html">📊 Dashboard</a>
          <a href="employees.html">👤 Employees</a>
          <a href="attendance.html">🗓 Attendance</a>
          <a href="performance.html">🚀 Performance</a>
          <a href="rewards.html">🎖 Rewards</a>
          <a class="active" href="feedback.html">💬 Feedback</a>
          <a href="ai-insights.html">🤖 AI Insights</a>
          <a href="settings.html">⚙ Settings</a>
        </nav>
      </aside>
      <main class="content">
        <header class="topbar">
          <div class="title-group">
            <h1>Feedback Center</h1>
            <p>Capture peer and manager feedback for fair reward decisions.</p>
          </div>
          <div class="avatar">FB</div>
        </header>

        <section class="card">
          <h2 class="section-title">Submit Feedback</h2>
          <form id="feedback-form" class="form-grid">
            <select id="feedback-employee" required></select>
            <input id="feedback-by" type="text" placeholder="Given by" required />
            <select id="feedback-category" required>
              <option value="">Select category</option>
              <option>Collaboration</option>
              <option>Ownership</option>
              <option>Innovation</option>
              <option>Communication</option>
            </select>
            <input id="feedback-rating" type="number" min="1" max="5" placeholder="Rating (1-5)" required />
            <input id="feedback-comment" type="text" placeholder="Feedback comment" required />
            <div class="form-actions">
              <button class="btn-primary" type="submit">Save Feedback</button>
            </div>
          </form>
        </section>

        <section class="section table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Employee</th>
                <th>By</th>
                <th>Category</th>
                <th>Rating</th>
                <th>Sentiment</th>
                <th>Comment</th>
              </tr>
            </thead>
            <tbody id="feedback-body"></tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
